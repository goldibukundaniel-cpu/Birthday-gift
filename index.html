<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎉 Happy Birthday! 🎂</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #fff3f8 0%, #f0e6ff 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      padding: 20px;
      width: 90%;
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      color: #e91e63;
      margin: 0.4em 0 0.2em;
      text-shadow: 0 2px 10px rgba(233,30,99,0.3);
    }

    .subtitle {
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      margin: 0 0 1.5em;
      color: #555;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 responsive ratio */
      height: 0;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.18);
      margin: 1.5em 0 2em;
      max-width: 100%;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .heart {
      font-size: clamp(2rem, 7vw, 4rem);
      margin: 0.6em 0;
    }

    footer {
      margin-top: 2em;
      font-size: 1rem;
      color: #777;
      opacity: 0.9;
    }

    @media (max-width: 500px) {
      .container { padding: 15px; }
      h1 { margin-top: 0.8em; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- === CHANGE THE NAME HERE (in the big title) === -->
    <h1>Happy Birthday, [Name]! 🎉🥳</h1>

    <p class="subtitle">A special surprise video made just for you 💕 Press play & enjoy!</p>

    <!-- === Your YouTube video is now correctly embedded === -->
    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube-nocookie.com/embed/XkmGfYfeVQY?si=KegUJWoD2jEf1btm"
        title="Happy Birthday Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <!-- === Optional: add name here too if you like === -->
    <div class="heart">💖 Made with lots of love for [Name]</div>

    <footer>Scan this QR anytime you need a smile 😊</footer>
  </div>

  <!-- Confetti library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script>
    // Launch confetti on page load
    function launchConfetti() {
      const duration = 5000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0, y: 0.6 }
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1, y: 0.6 }
        });

        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    }

    setTimeout(launchConfetti, 600);

    // Extra confetti when video plays
    const iframe = document.querySelector('iframe');
    if (iframe) {
      window.addEventListener('message', (event) => {
        if (event.data && typeof event.data === 'string' && event.data.includes('"event":"onStateChange"')) {
          try {
            const data = JSON.parse(event.data);
            if (data.info === 1) { // playing
              confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff69b4']
              });
            }
          } catch (e) {}
        }
      });
    }
  </script>

</body>
</html>
